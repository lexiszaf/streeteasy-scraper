name: Daily UWS Apartment Scraper

on:
  schedule:
    # Runs every day at 8:00 AM Eastern (12:00 UTC)
    - cron: "0 12 * * *"
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Need write access to commit seen_listings.json back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scraper.py

      - name: Commit updated seen listings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_listings.json
          git diff --staged --quiet || git commit -m "chore: update seen listings [$(date '+%Y-%m-%d')]"
          git push
